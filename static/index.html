<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo Video Content</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; color: #a78bfa; }
    header span { font-size: 13px; color: #64748b; }

    .container {
      display: grid;
      grid-template-columns: 340px 1fr 1fr;
      gap: 20px;
      padding: 20px 24px;
      flex: 1;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .panel {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel h2 {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 5px; }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.6;
      padding: 10px 12px;
      resize: vertical;
      min-height: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #7c3aed; }

    select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      cursor: pointer;
    }

    .slider-wrap { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; accent-color: #7c3aed; cursor: pointer; }
    .slider-val { min-width: 36px; text-align: right; font-size: 13px; color: #a78bfa; font-weight: 600; }

    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-preview  { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }
    .btn-generate { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; }

    /* Progress */
    .progress-box { display: none; flex-direction: column; gap: 7px; }
    .progress-box.active { display: flex; }
    .progress-bar-wrap { background: #0f1117; border-radius: 999px; height: 5px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 999px; transition: width 0.4s ease; width: 0%; }
    .progress-msg { font-size: 12px; color: #94a3b8; }

    .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; font-weight: 600; display: inline-block; }
    .status-tag.idle    { background: #1e293b; color: #64748b; }
    .status-tag.running { background: #312e81; color: #a5b4fc; }
    .status-tag.done    { background: #14532d; color: #4ade80; }
    .status-tag.error   { background: #450a0a; color: #f87171; }

    .error-msg { font-size: 12px; color: #f87171; background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 9px 12px; display: none; }
    .error-msg.visible { display: block; }

    /* ===== PREVIEW PANEL ===== */
    .scenes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: calc(100vh - 180px);
    }

    .scene-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .scene-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .scene-num {
      font-size: 11px;
      font-weight: 700;
      color: #7c3aed;
      background: #1e1b4b;
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
    }
    .scene-dur {
      font-size: 11px;
      color: #64748b;
      flex-shrink: 0;
    }
    .scene-type-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .scene-type-badge.video { background: #14532d; color: #4ade80; }
    .scene-type-badge.image { background: #1e3a5f; color: #60a5fa; }

    .scene-query {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
    }
    .scene-prompt {
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
      font-style: italic;
    }

    .preview-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px;
      color: #64748b;
      font-size: 13px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #2d3148;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .preview-empty {
      text-align: center;
      padding: 40px 20px;
      color: #334155;
      font-size: 13px;
    }
    .preview-empty .icon { font-size: 36px; margin-bottom: 8px; }

    /* ===== OUTPUT PANEL ===== */
    .video-wrap {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-wrap video { width: 100%; height: 100%; }
    .video-placeholder { color: #334155; font-size: 13px; text-align: center; }
    .video-placeholder .icon { font-size: 40px; margin-bottom: 8px; }

    .btn-download {
      display: none;
      background: #14532d;
      border: 1px solid #166534;
      border-radius: 8px;
      color: #4ade80;
      font-size: 13px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-download:hover { background: #166534; }
    .btn-download.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>🎞️ Tạo Video Content</h1>
  <span>AI chia cảnh · Pexels + Pixabay · TTS tự động</span>
</header>

<div class="container">

  <!-- COL 1: Input -->
  <div class="panel">
    <h2>Nội dung</h2>

    <div>
      <label>Văn bản thuyết minh</label>
      <textarea id="content" placeholder="Dán nội dung vào đây..."></textarea>
    </div>

    <div>
      <label>Giọng đọc</label>
      <select id="voice">
        <option value="">-- Edge TTS (mặc định) --</option>
        <option value="BV421_vivn_streaming">Nhỏ Ngọt Ngào</option>
        <option value="BV074_streaming">Cô Gái Hoạt Ngôn</option>
        <option value="vi_female_huong">Giọng Nữ Phổ Thông</option>
        <option value="BV074_streaming_dsp">Giọng Bé</option>
        <option value="BV562_streaming">Mai</option>
        <option value="multi_female_peiqi_uranus_bigtts">Giọng Gái Mới Lớn</option>
        <option value="multi_female_yangguangnv_uranus_bigtts">Ban Mai</option>
        <option value="multi_female_sisi_uranus_bigtts">Bản Tin Nữ</option>
        <option value="BV075_streaming">Thanh Niên Tự Tin</option>
        <option value="multi_male_felipe_uranus_bigtts">Giọng Nam Trầm</option>
        <option value="BV560_streaming">Alex Đại Đế</option>
      </select>
    </div>

    <div>
      <label>Tốc độ đọc</label>
      <div class="slider-wrap">
        <input type="range" id="rate" min="0.5" max="2.0" step="0.1" value="1.0"
               oninput="document.getElementById('rate-val').textContent=parseFloat(this.value).toFixed(1)+'x'" />
        <span class="slider-val" id="rate-val">1.0x</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-preview" id="btn-preview" onclick="preview()">🔍 Xem AI phân tích</button>
      <button class="btn btn-generate" id="btn-gen" onclick="generate()">🎬 Tạo Video</button>
    </div>

    <div class="progress-box" id="progress-box">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="progress-msg" id="progress-msg">Đang khởi động...</span>
        <span class="status-tag running" id="status-tag">Đang chạy</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- COL 2: Preview AI scenes -->
  <div class="panel">
    <h2>AI phân tích cảnh</h2>
    <div class="scenes-list" id="scenes-list">
      <div class="preview-empty">
        <div class="icon">🤖</div>
        <div>Nhấn <b>Xem AI phân tích</b> để xem<br>AI chia cảnh và chọn keyword</div>
      </div>
    </div>
  </div>

  <!-- COL 3: Output video -->
  <div class="panel">
    <h2>Kết quả video</h2>

    <div class="video-wrap" id="video-wrap">
      <div class="video-placeholder">
        <div class="icon">🎬</div>
        <div>Video sẽ hiện ở đây</div>
      </div>
    </div>

    <a class="btn-download" id="btn-download" download="content_video.mp4">
      ⬇️ Tải xuống video
    </a>
  </div>

</div>

<script>
  const API = '';
  let pollTimer = null;

  // ===== PREVIEW =====
  async function preview() {
    const content = document.getElementById('content').value.trim();
    if (!content) { alert('Chưa nhập nội dung!'); return; }

    const list = document.getElementById('scenes-list');
    list.innerHTML = '<div class="preview-loading"><div class="spinner"></div>AI đang phân tích...</div>';
    document.getElementById('btn-preview').disabled = true;

    try {
      const res = await fetch(`${API}/api/preview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, voice: '', rate: 1.0 }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const scenes = data.scenes || [];
      if (!scenes.length) {
        list.innerHTML = '<div class="preview-empty"><div class="icon">😕</div><div>Không chia được cảnh nào</div></div>';
        return;
      }

      list.innerHTML = scenes.map((s, i) => `
        <div class="scene-card">
          <div class="scene-card-header">
            <span class="scene-num">#${i + 1}</span>
            <span class="scene-query">${s.query || ''}</span>
            <span class="scene-type-badge ${s.type || 'video'}">${s.type || 'video'}</span>
            <span class="scene-dur">${s.duration || 6}s</span>
          </div>
          ${s.prompt ? `<div class="scene-prompt">${s.prompt}</div>` : ''}
        </div>
      `).join('');

    } catch (e) {
      list.innerHTML = `<div class="error-msg visible">❌ ${e.message}</div>`;
    } finally {
      document.getElementById('btn-preview').disabled = false;
    }
  }

  // ===== GENERATE =====
  async function generate() {
    const content = document.getElementById('content').value.trim();
    if (!content) { alert('Chưa nhập nội dung!'); return; }

    const voice = document.getElementById('voice').value;
    const rate  = parseFloat(document.getElementById('rate').value);

    clearPoll();
    setStatus('running');
    document.getElementById('btn-gen').disabled = true;
    document.getElementById('btn-preview').disabled = true;
    document.getElementById('btn-download').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('video-wrap').innerHTML = `
      <div class="video-placeholder"><div class="icon">⏳</div><div>Đang xử lý...</div></div>`;

    try {
      const res = await fetch(`${API}/api/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, voice, rate }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Lỗi server');

      pollTimer = setInterval(() => poll(data.job_id), 2000);

    } catch (e) {
      showError(e.message);
    }
  }

  async function poll(jobId) {
    try {
      const res  = await fetch(`${API}/api/status/${jobId}`);
      const data = await res.json();

      document.getElementById('progress-bar').style.width = (data.progress || 0) + '%';
      document.getElementById('progress-msg').textContent = data.message || '';

      if (data.status === 'done') {
        clearPoll();
        setStatus('done');
        document.getElementById('btn-gen').disabled = false;
        document.getElementById('btn-preview').disabled = false;
        const url = `${API}/api/download/${jobId}`;
        document.getElementById('video-wrap').innerHTML = `<video controls autoplay src="${url}"></video>`;
        const btn = document.getElementById('btn-download');
        btn.href = url;
        btn.classList.add('visible');
      } else if (data.status === 'error') {
        clearPoll();
        showError(data.message || 'Lỗi không xác định');
      }
    } catch (e) { /* network hiccup */ }
  }

  function showError(msg) {
    setStatus('error');
    document.getElementById('btn-gen').disabled = false;
    document.getElementById('btn-preview').disabled = false;
    const el = document.getElementById('error-msg');
    el.textContent = '❌ ' + msg;
    el.classList.add('visible');
  }

  function setStatus(s) {
    const tag = document.getElementById('status-tag');
    document.getElementById('progress-box').classList.add('active');
    tag.className = 'status-tag ' + s;
    tag.textContent = { running: 'Đang chạy', done: 'Hoàn tất', error: 'Lỗi' }[s] || s;
  }

  function clearPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }
</script>

</body>
</html>
