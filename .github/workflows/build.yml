name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn httpx python-dotenv python-jose[cryptography] bcrypt psycopg2-binary pydantic google-genai python-multipart pyinstaller

      - name: Build translate_server.exe
        run: |
          pyinstaller --onefile --name translate_server `
            --hidden-import=uvicorn.logging `
            --hidden-import=uvicorn.loops `
            --hidden-import=uvicorn.loops.auto `
            --hidden-import=uvicorn.protocols `
            --hidden-import=uvicorn.protocols.http `
            --hidden-import=uvicorn.protocols.http.auto `
            --hidden-import=uvicorn.protocols.websockets `
            --hidden-import=uvicorn.protocols.websockets.auto `
            --hidden-import=uvicorn.lifespan `
            --hidden-import=uvicorn.lifespan.off `
            --hidden-import=starlette `
            --hidden-import=psycopg2 `
            --hidden-import=jose `
            --hidden-import=bcrypt `
            --hidden-import=google.genai `
            --collect-all=google.genai `
            translate_server.py

      - name: Download FFmpeg for Windows
        shell: cmd
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          tar -xf ffmpeg.zip
          move ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe
          move ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe ffprobe.exe

      - name: Copy binaries to electron resources
        shell: cmd
        run: |
          mkdir electron\resources\python
          copy dist\translate_server.exe electron\resources\python\
          copy ffmpeg.exe electron\resources\python\
          copy ffprobe.exe electron\resources\python\
          xcopy static_translate electron\resources\python\static_translate\ /E /I /Y

      - name: Create .env file and debug launcher
        shell: cmd
        env:
          BEEKNOEE_API_KEY: ${{ secrets.BEEKNOEE_API_KEY }}
        run: |
          echo BEEKNOEE_API_KEY=%BEEKNOEE_API_KEY% > electron\resources\python\.env
          echo FFMPEG_BIN=ffmpeg >> electron\resources\python\.env
          echo @echo off > electron\resources\python\run_server.bat
          echo cd /d "%~dp0" >> electron\resources\python\run_server.bat
          echo translate_server.exe >> electron\resources\python\run_server.bat
          echo pause >> electron\resources\python\run_server.bat

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install --ignore-scripts

      - name: Build Electron app
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_DRAFT: false
          EP_PRE_RELEASE: false
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DichVideo-Windows
          path: electron/dist/*.exe
          retention-days: 30
